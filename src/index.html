<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4caf50">
    <title>StayAwake PWA</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #f4f4f9; --text: #333; --active: #4caf50; --inactive: #f44336; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: var(--bg); color: var(--text); transition: background 0.3s; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 300px; position: relative; transition: all 0.3s; }
        .card.collapsed { padding: 1rem; max-width: 200px; }
        .collapse-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
        .collapse-btn:hover { background: rgba(0,0,0,0.1); }
        button { font-size: 1.2rem; padding: 1rem 2rem; border: none; border-radius: 50px; cursor: pointer; color: white; transition: transform 0.1s; width: 100%; }
        button:active { transform: scale(0.98); }
        .card.collapsed button { font-size: 1rem; padding: 0.5rem 1rem; }
        .on { background-color: var(--active); }
        .off { background-color: var(--inactive); }
        .timer-group { margin-top: 1.5rem; }
        .card.collapsed .timer-group, .card.collapsed #status-text { display: none; }
        input { width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; text-align: center; }
        #status-text { margin-bottom: 1rem; font-weight: bold; }

        /* Add these styles to your <style> block */
        body.compact {
            background: transparent;
        }

        body.compact .card {
            width: 100vw;
            max-width: none;
            height: 100vh;
            border-radius: 0;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: row; /* Horizontal layout for thin split-screen */
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        body.compact .timer-group, 
        body.compact #status-text {
            display: none; /* Hide extra info in compact mode */
        }

        body.compact #toggleBtn,
        body.compact #compactBtn {
            flex: 1;
            width: auto;
            margin: 0;
            padding: 1rem 0;
            border-radius: 0;
            font-size: 0.9rem;
            background: #424242;
        }

        body.compact #compactBtn {
            background: #424242;
        }

    </style>
</head>
<body>

    <div class="card">
        <video id="pipVideo" src="silent.mp4" loop muted playsinline preload="auto" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></video>

        <div id="status-text">Screen Lock: INACTIVE</div>
        <button id="toggleBtn" class="off">Enable StayAwake</button>
        <button id="compactBtn">
            Toggle Compact Mode
        </button>
        <!-- Add this button to your card (you can hide it on Android via JS) -->
        <button id="iphoneBtn" style="margin-top: 10px; background: #007aff; display: none;">
            iPhone Background Mode (PiP)
        </button>
        <div class="timer-group">
            <label>Max Time (mins): </label>
            <input type="number" id="maxTime" value="30" min="1">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
